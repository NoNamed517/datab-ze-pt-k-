<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Ptačí Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>Ptačí Dashboard</h1>
</header>

<form method="GET">
<select name="rad">
<option value="">-- Všechny --</option>
{% for r in filter_options.rad %}
<option value="{{r}}" {{'selected' if params.get('rad')==r else ''}}>{{r}}</option>
{% endfor %}
</select>

<select name="typ_potravy">
<option value="">-- Všechny --</option>
{% for t in filter_options.typ_potravy %}
<option value="{{t}}" {{'selected' if params.get('typ_potravy')==t else ''}}>{{t}}</option>
{% endfor %}
</select>

<input type="number" name="hmotnost_min" placeholder="min" value="{{params.get('hmotnost_min','')}}">
<input type="number" name="hmotnost_max" placeholder="max" value="{{params.get('hmotnost_max','')}}">

<select name="razeni">
<option value="nazev">Název</option>
<option value="hmotnost_g">Hmotnost</option>
</select>

<select name="smer">
<option value="ASC">Vzestupně</option>
<option value="DESC">Sestupně</option>
</select>

<button>Filtrovat</button>
<a href="/">Reset</a>
</form>

<div class="stats">
<div>{{stats['pocet']}} druhů</div>
<div>{{stats['prum_delka']}} cm</div>
<div>{{stats['prum_hmotnost']}} g</div>
<div>{{stats['max_hmotnost']}} g</div>
</div>

<canvas id="chartRad"></canvas>
<canvas id="chartMigrace"></canvas>

<script>
new Chart(document.getElementById('chartRad'), {
type: 'bar',
data: {
labels: {{graf_rad_labels|tojson}},
datasets: [{data: {{graf_rad_data|tojson}}}]
}
});

new Chart(document.getElementById('chartMigrace'), {
type: 'doughnut',
data: {
labels: {{graf_migrace_labels|tojson}},
datasets: [{data: {{graf_migrace_data|tojson}}}]
}
});
</script>

<table>
<tr><th>Název</th><th>Hmotnost</th></tr>
{% for p in ptaci %}
<tr>
<td>{{p['nazev']}}</td>
<td>{{p['hmotnost_g']}}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
